<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fully Functional SPA</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="toast-container"></div>
    <div class="app-container">
      <aside id="sidebar" class="sidebar">
        <div class="logo-section">SPA</div>
        <ul class="nav-links">
          <li class="active" data-page="dashboard">
            <i data-lucide="layout-dashboard"></i> Dashboard
          </li>
          <li data-page="users"><i data-lucide="users"></i> Users</li>
          <li data-page="tasks"><i data-lucide="check-square"></i> Tasks</li>
          <li data-page="settings"><i data-lucide="settings"></i> Settings</li>
        </ul>
      </aside>

      <main class="main-content">
        <header>
          <button class="icon-btn" id="toggleSidebar">
            <i data-lucide="menu"></i>
          </button>
          <h3 id="pageTitle">Dashboard</h3>
          <button class="icon-btn" id="themeToggle">
            <i data-lucide="moon" id="themeIcon"></i>
          </button>
        </header>

        <div class="dashboard-padding">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon"><i data-lucide="users"></i></div>
              <div>
                <p style="color: var(--text-muted); font-size: 0.9rem">
                  Total Users
                </p>
                <h2 id="userCount">0</h2>
              </div>
            </div>
            <div class="stat-card">
              <div
                class="stat-icon"
                style="background: #dcfce7; color: #16a34a"
              >
                <i data-lucide="list-todo"></i>
              </div>
              <div>
                <p style="color: var(--text-muted); font-size: 0.9rem">
                  Active Tasks
                </p>
                <h2>18</h2>
              </div>
            </div>
            <div class="stat-card">
              <div
                class="stat-icon"
                style="background: #fef3c7; color: #d97706"
              >
                <i data-lucide="wallet"></i>
              </div>
              <div>
                <p style="color: var(--text-muted); font-size: 0.9rem">
                  Revenue
                </p>
                <h2>$3,450</h2>
              </div>
            </div>
          </div>

          <div class="data-section">
            <div class="table-header">
              <div class="search-bar">
                <i data-lucide="search" class="search-icon" size="18"></i>
                <input
                  type="text"
                  id="searchInput"
                  placeholder="Search by name..."
                />
              </div>
              <button class="add-btn" id="openModal">+ Add New User</button>
            </div>
            <div style="overflow-x: auto">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Company</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3 style="margin-bottom: 20px">Add New User</h3>
        <form id="userForm">
          <div class="form-group">
            <label>Full Name</label>
            <input
              type="text"
              id="nameInput"
              placeholder="Enter name"
              required
            />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input
              type="email"
              id="emailInput"
              placeholder="example@mail.com"
              required
            />
          </div>
          <div style="display: flex; gap: 10px; margin-top: 20px">
            <button
              type="button"
              class="add-btn"
              id="closeModal"
              style="background: #e2e8f0; color: #475569"
            >
              Cancel
            </button>
            <button type="submit" class="add-btn" style="flex: 1">
              Save User
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      lucide.createIcons();

      let usersData = [];

      // 1. Digital Data Fetching
      async function fetchUsers() {
        try {
          const res = await fetch("https://jsonplaceholder.typicode.com/users");
          const data = await res.json();
          usersData = data.map((u) => ({
            id: u.id,
            name: u.name,
            email: u.email,
            company: u.company ? u.company.name : "Freelance",
          }));
          renderTable(usersData);
        } catch (error) {
          console.error("Error fetching users:", error);
        }
      }

      // 2. Delete Action
      function renderTable(data) {
        const tbody = document.getElementById("userTableBody");
        const countEl = document.getElementById("userCount");

        countEl.innerText = data.length;

        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted)">No users found.</td></tr>`;
          return;
        }

        tbody.innerHTML = data
          .map(
            (user) => `
            <tr>
                <td style="font-weight:500;">${user.name}</td>
                <td style="color:var(--text-muted);">${user.email}</td>
                <td>${user.company}</td>
                <td>
                    <button class="btn-danger" onclick="deleteUser(${user.id})" title="Delete User">
                        <i data-lucide="trash-2"></i>
                    </button>
                </td>
            </tr>
        `,
          )
          .join("");

        lucide.createIcons();
      }

      // 3. Add New User
      document.getElementById("userForm").onsubmit = (e) => {
        e.preventDefault();
        const name = document.getElementById("nameInput").value;
        const email = document.getElementById("emailInput").value;

        const newUser = {
          id: Date.now(),
          name: name,
          email: email,
          company: "Manual Entry",
        };

        usersData.unshift(newUser);
        renderTable(usersData);

        document.getElementById("modalOverlay").style.display = "none";
        e.target.reset();

        showToast("User successfully added!");
      };

      // 4. Delete User
      function deleteUser(id) {
        if (confirm("Are you sure you want to delete this user?")) {
          usersData = usersData.filter((user) => user.id !== id);
          renderTable(usersData);
        }
      }

      // 5. Search User
      document.getElementById("searchInput").addEventListener("input", (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = usersData.filter((u) =>
          u.name.toLowerCase().includes(term),
        );
        renderTable(filtered);
      });

      // 6. Navigation Logic
      document.querySelectorAll(".nav-links li").forEach((item) => {
        item.addEventListener("click", function () {
          document
            .querySelector(".nav-links li.active")
            .classList.remove("active");

          this.classList.add("active");

          document.getElementById("pageTitle").innerText = this.innerText;
        });
      });

      // 7. Theme & Sidebar
      document.getElementById("themeToggle").addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");
        const isDark = document.body.classList.contains("dark-mode");
        document
          .getElementById("themeIcon")
          .setAttribute("data-lucide", isDark ? "sun" : "moon");
        lucide.createIcons();
      });

      const modal = document.getElementById("modalOverlay");
      document.getElementById("openModal").onclick = () =>
        (modal.style.display = "flex");
      document.getElementById("closeModal").onclick = () =>
        (modal.style.display = "none");

      document.getElementById("toggleSidebar").onclick = () => {
        const sidebar = document.getElementById("sidebar");
        if (window.innerWidth > 768) sidebar.classList.toggle("collapsed");
        else sidebar.classList.toggle("active");
      };

      function showToast(message) {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `<i data-lucide="check-circle"></i> ${message}`;
        container.appendChild(toast);
        lucide.createIcons();

        setTimeout(() => {
          toast.style.opacity = "0";
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      fetchUsers();
    </script>
  </body>
</html>
